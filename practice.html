<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Practice — Number Sense</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="practice-body">

  <a href="index.html" class="back-link">← Back to Skills</a>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-pill">
      <span class="stat-label">Correct</span>
      <span class="stat-value" id="stat-correct">0</span>
    </div>
    <div class="stat-pill stat-wrong">
      <span class="stat-label">Wrong</span>
      <span class="stat-value" id="stat-wrong">0</span>
    </div>
    <div class="stat-pill stat-avg">
      <span class="stat-label">Avg Time</span>
      <span class="stat-value" id="stat-avg">—</span>
    </div>
  </div>

  <!-- Practice arena -->
  <div class="arena">

    <!-- Skill name + difficulty pills -->
    <div class="arena-top-row">
      <div class="skill-label" id="skill-label">Practice</div>
      <div class="diff-pills">
        <button class="diff-pill" data-diff="easy">Easy</button>
        <button class="diff-pill active" data-diff="medium">Medium</button>
        <button class="diff-pill" data-diff="hard">Hard</button>
      </div>
    </div>

    <!-- Timer -->
    <div class="timer-row">
      <div class="timer-bar-wrap">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
      <span class="timer-text" id="timer-text">0.0s</span>
    </div>

    <!-- Problem box -->
    <div class="problem-box" id="problem-box">
      <span class="problem-text" id="problem-text">Loading…</span>
    </div>

    <!-- ── INTEGER / DECIMAL answer row (default) ── -->
    <div class="answer-row" id="answer-row-standard">
      <input
        type="text"
        id="answer-input"
        class="answer-input"
        placeholder="Your answer"
        autocomplete="off"
        autofocus
      />
      <button class="submit-btn" id="submit-btn">Check</button>
    </div>

    <!-- ── FRACTION answer row (shown for fraction answers) ── -->
    <div class="answer-row" id="answer-row-fraction" style="display:none; flex-direction:column; gap:10px;">
      <p class="fraction-hint" id="fraction-hint">Enter your answer as a fraction:</p>

      <!-- Mixed number inputs: [ whole ] [ num ] / [ den ] -->
      <div class="fraction-input-group">
        <input type="text" id="frac-whole" class="answer-input frac-box" placeholder="whole" inputmode="numeric"/>
        <div class="frac-stack">
          <input type="text" id="frac-num"   class="answer-input frac-box frac-top" placeholder="num" inputmode="numeric"/>
          <div class="frac-line"></div>
          <input type="text" id="frac-den"   class="answer-input frac-box frac-bot" placeholder="den" inputmode="numeric"/>
        </div>
        <button class="submit-btn" id="submit-btn-frac">Check</button>
      </div>
      <p class="fraction-sub">Leave "whole" blank if the answer is a proper fraction. Leave num/den blank if the answer is a whole number.</p>
    </div>

    <!-- X lives -->
    <div class="lives-row" id="lives-row">
      <span class="life" id="life-0">✕</span>
      <span class="life" id="life-1">✕</span>
      <span class="life" id="life-2">✕</span>
    </div>

    <!-- Explanation panel -->
    <div class="explanation-panel" id="explanation-panel" style="display:none;">
      <h3 class="explanation-title" id="explanation-title">Let's review this one!</h3>
      <p class="explanation-body" id="explanation-body"
         style="white-space:pre-line;font-family:'Courier New',monospace;font-size:.88rem;line-height:1.9;"></p>
      <button class="next-btn" id="next-btn">I'm ready for the next question →</button>
    </div>

  </div>

  <script src="js/skills.js"></script>
  <script src="js/practice.js"></script>
</body>
</html>
